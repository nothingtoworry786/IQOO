<style>

<script>
        // Simple terminal text rotation for atmospheric effect
        const strings = [
            "SCANNING COMPETITOR SIGNALS...",
            "DECRYPTING MARKET TRENDS...",
            "CALIBRATING PREDICTIVE MODELS...",
            "SYNCING GLOBAL DATABASES...",
            "ESTABLISHING SECURE CONNECTION..."
        ];
        let idx = 0;
        const terminalEl = document.getElementById('terminal-text');

        const rotateText = () => {
            idx = (idx + 1) % strings.length;
            terminalEl.innerText = strings[idx];
        };

        setInterval(rotateText, 500);

        // Simulated redirect or state change after loading
        setTimeout(() => {
            document.body.classList.add('transition-opacity', 'duration-500', 'opacity-0');
        }, 2800);
    </script>
